<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEXUS - Access Granted</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Courier New', monospace;
            background: #0a0e27;
            color: #00ff88;
            overflow: hidden;
            line-height: 1.6;
        }

        /* Background Animation */
        @keyframes scanlines {
            0% { transform: translateY(0); }
            100% { transform: translateY(10px); }
        }

        @keyframes glitch {
            0%, 100% { text-shadow: 0 0 10px #00ff88; }
            50% { text-shadow: 0 0 20px #ff0055; }
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: repeating-linear-gradient(
                0deg,
                rgba(0, 255, 136, 0.03),
                rgba(0, 255, 136, 0.03) 1px,
                transparent 1px,
                transparent 2px
            );
            animation: scanlines 8s linear infinite;
            pointer-events: none;
            z-index: 1;
        }

        .container {
            position: relative;
            width: 100%;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            z-index: 2;
        }

        .game-container {
            width: 100%;
            max-width: 900px;
            background: rgba(10, 14, 39, 0.95);
            border: 2px solid #00ff88;
            box-shadow: 0 0 20px #00ff88, inset 0 0 20px rgba(0, 255, 136, 0.1);
            padding: 40px;
            border-radius: 8px;
            animation: pulse 3s ease-in-out infinite;
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
            border-bottom: 1px solid #00ff88;
            padding-bottom: 20px;
        }

        .header h1 {
            font-size: 32px;
            text-shadow: 0 0 10px #00ff88;
            animation: glitch 3s infinite;
            margin-bottom: 10px;
        }

        .header p {
            color: #00ccff;
            font-size: 14px;
        }

        .progress-bar {
            width: 100%;
            height: 30px;
            background: rgba(0, 255, 136, 0.1);
            border: 1px solid #00ff88;
            border-radius: 5px;
            margin-bottom: 30px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #00ff88, #00ccff);
            width: 0%;
            transition: width 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #0a0e27;
            font-weight: bold;
            font-size: 12px;
        }

        .story-section {
            background: rgba(0, 255, 136, 0.05);
            border-left: 3px solid #00ff88;
            padding: 20px;
            margin-bottom: 30px;
            border-radius: 5px;
        }

        .story-section h2 {
            color: #00ccff;
            margin-bottom: 10px;
            font-size: 18px;
        }

        .story-section p {
            color: #00ff88;
            font-size: 14px;
            line-height: 1.8;
        }

        .puzzle-container {
            background: rgba(0, 255, 136, 0.05);
            border: 1px solid #00ff88;
            padding: 30px;
            border-radius: 8px;
            margin-bottom: 30px;
        }

        .puzzle-title {
            color: #00ccff;
            font-size: 20px;
            margin-bottom: 15px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .puzzle-description {
            color: #00ff88;
            margin-bottom: 20px;
            font-size: 14px;
            line-height: 1.8;
        }

        .puzzle-input {
            width: 100%;
            padding: 12px;
            background: rgba(0, 255, 136, 0.1);
            border: 1px solid #00ff88;
            color: #00ff88;
            border-radius: 5px;
            font-family: 'Courier New', monospace;
            margin-bottom: 15px;
            font-size: 14px;
        }

        .puzzle-input::placeholder {
            color: rgba(0, 255, 136, 0.5);
        }

        .puzzle-input:focus {
            outline: none;
            box-shadow: 0 0 10px #00ff88;
            border-color: #00ccff;
        }

        .buttons {
            display: flex;
            gap: 10px;
        }

        .btn {
            flex: 1;
            padding: 12px 20px;
            background: rgba(0, 255, 136, 0.1);
            border: 1px solid #00ff88;
            color: #00ff88;
            cursor: pointer;
            border-radius: 5px;
            font-family: 'Courier New', monospace;
            font-weight: bold;
            transition: all 0.3s;
            text-transform: uppercase;
            font-size: 12px;
            letter-spacing: 1px;
        }

        .btn:hover {
            background: #00ff88;
            color: #0a0e27;
            box-shadow: 0 0 15px #00ff88;
        }

        .btn:active {
            transform: scale(0.95);
        }

        .btn-submit {
            background: rgba(0, 204, 255, 0.1);
            border-color: #00ccff;
            color: #00ccff;
        }

        .btn-submit:hover {
            background: #00ccff;
            color: #0a0e27;
            box-shadow: 0 0 15px #00ccff;
        }

        .hint {
            background: rgba(255, 0, 85, 0.1);
            border-left: 3px solid #ff0055;
            padding: 10px 15px;
            margin-top: 15px;
            color: #ff0055;
            font-size: 12px;
            border-radius: 3px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .hint:hover {
            background: rgba(255, 0, 85, 0.2);
        }

        .message {
            margin-top: 20px;
            padding: 15px;
            border-radius: 5px;
            font-weight: bold;
            text-align: center;
            display: none;
        }

        .message.show {
            display: block;
            animation: glitch 0.5s;
        }

        .message.success {
            background: rgba(0, 255, 136, 0.2);
            border: 1px solid #00ff88;
            color: #00ff88;
        }

        .message.error {
            background: rgba(255, 0, 85, 0.2);
            border: 1px solid #ff0055;
            color: #ff0055;
        }

        .final-screen {
            text-align: center;
            display: none;
        }

        .final-screen.show {
            display: block;
        }

        .final-screen h2 {
            color: #00ff88;
            font-size: 28px;
            margin-bottom: 20px;
            text-shadow: 0 0 15px #00ff88;
        }

        .final-screen p {
            color: #00ccff;
            font-size: 16px;
            margin-bottom: 20px;
        }

        .link-box {
            background: rgba(0, 255, 136, 0.1);
            border: 2px solid #00ff88;
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 20px;
        }

        .link-box p {
            color: #00ff88;
            font-size: 12px;
            margin-bottom: 10px;
        }

        .link-box input {
            width: 100%;
            padding: 12px;
            background: rgba(0, 255, 136, 0.1);
            border: 1px solid #00ff88;
            color: #00ff88;
            border-radius: 5px;
            font-family: 'Courier New', monospace;
            font-size: 12px;
            margin-bottom: 10px;
        }

        .copy-btn {
            background: #00ff88;
            color: #0a0e27;
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            font-family: 'Courier New', monospace;
            transition: all 0.3s;
        }

        .copy-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 0 15px #00ff88;
        }

        .view-link-btn {
            width: 100%;
            padding: 18px 24px;
            margin-bottom: 20px;
            border: 2px solid #00ff88;
            border-radius: 8px;
            background: linear-gradient(135deg, rgba(0, 255, 136, 0.2), rgba(0, 204, 255, 0.18));
            color: #00ff88;
            font-size: 22px;
            font-weight: 700;
            letter-spacing: 1px;
            font-family: 'Courier New', monospace;
            text-transform: uppercase;
            cursor: pointer;
            box-shadow: 0 0 20px rgba(0, 255, 136, 0.35), inset 0 0 25px rgba(0, 255, 136, 0.1);
            transition: transform 0.2s ease, box-shadow 0.2s ease, background 0.3s ease, color 0.3s ease;
            animation: pulse 2s ease-in-out infinite;
        }

        .view-link-btn:hover {
            transform: translateY(-2px) scale(1.01);
            color: #0a0e27;
            background: #00ff88;
            box-shadow: 0 0 28px rgba(0, 255, 136, 0.85);
        }

        .view-link-btn:active {
            transform: scale(0.98);
        }

        .password-box {
            background: rgba(255, 0, 85, 0.1);
            border: 2px solid #ff0055;
            padding: 20px;
            border-radius: 8px;
            margin-top: 20px;
        }

        .password-box h3 {
            color: #ff0055;
            margin-bottom: 10px;
        }

        .password-box p {
            color: #ff0055;
            font-size: 14px;
            word-break: break-all;
            font-weight: bold;
        }

        .stats {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
            margin-top: 30px;
        }

        .stat-card {
            background: rgba(0, 204, 255, 0.1);
            border: 1px solid #00ccff;
            padding: 15px;
            border-radius: 5px;
            text-align: center;
        }

        .stat-card h3 {
            color: #00ccff;
            font-size: 12px;
            margin-bottom: 5px;
        }

        .stat-card p {
            color: #00ff88;
            font-size: 20px;
            font-weight: bold;
        }

        @media (max-width: 768px) {
            .game-container {
                padding: 20px;
            }

            .header h1 {
                font-size: 24px;
            }

            .puzzle-title {
                font-size: 16px;
            }

            .buttons {
                flex-direction: column;
            }

            .stats {
                grid-template-columns: 1fr;
            }

            .view-link-btn {
                font-size: 16px;
                padding: 14px 16px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="game-container">
            <div class="header">
                <h1>⚡ NEXUS ACCESS ⚡</h1>
                <p>RESTRICTED SYSTEM - AUTHORIZATION REQUIRED</p>
            </div>

            <div class="progress-bar">
                <div class="progress-fill"></div>
            </div>

            <div id="gameContent"></div>
        </div>
    </div>

    <script>
        // Puzzle Data with Story (replaced with 10 riddles)
        const puzzles = [
            {
                id: 1,
                story: `[ধাদা 1] Someone's name `,
                title: "Layer 1: ধাঁধা",
                description: "তোমাদের মধ্যে সহজ সরল লোক কে ",
                answer: "Jotish",
                hint: "তোমাদের গ্রুপ এর ই একজন, ইংলিশ এ নাম দেও ",
                type: "ধাঁধা"
            },
            {
                id: 2,
                story: `একজিনিস যা সারাদিনে পৃথিবী ঘুরে আসতে পারে `,
                title: "Layer 2: ধাঁধা",
                description: "সকালে জন্ম নেয় বিকালে মারা   যায় | পরের দিন সকালে আবার জন্ম নেয় বিকালে আবার মারা যায় , যার জীবন এর শেষ নেই , যাকে চার জীবন অচল ",
                answer: "সূর্য",
                hint: "রাতের সময় যা দেখা যায় না ",
                type: "ধাঁধা"
            },
            {
                id: 3,
                story: ``,
                title: "Layer 3: ধাঁধা",
                description: "পৃথিবীর মতো গোল, কিন্তু পৃথিবী নয়; পাতার মতো সবুজ, কিন্তু পাতা নয়; রক্তের মতো লাল, কিন্তু রক্ত নয়?",
                answer: "তরমুজ",
                hint: "🍉 খাবার জিনিস",
                type: "ধাঁধা"
            },
            {
                id: 4,
                story: `[ধাদা 4] তিন অক্ষরে নাম যার, যাতে তৈরি তাতেই ধ্বংস হয় | শেষের অক্ষর বাদ দিলে সোজা বিয়ের পিঁড়িতে বসে।`,
                title: "Layer 4: ধাঁধা",
                description: "তিন অক্ষরে নাম যার, যাতে তৈরি তাতেই ধ্বংস; শেষের অক্ষর বাদ দিলে সোজা বিয়ের পিঁড়িতে বসে।",
                answer: "বরফ",
                hint: "ঠান্ডা হলে তৈরি হয়",
                type: "ধাঁধা"
            },
            {
                id: 5,
                story: `[ধাদা 5] যার দাঁত আছে কিন্তু কামড় দিতে পারে না?`,
                title: "Layer 5: ধাঁধা",
                description: "যার দাঁত আছে কিন্তু কামড় দিতে পারে না?",
                answer: "চিরুনি",
                hint: "চুল গোঁজা জিনিস",
                type: "ধাঁধা"
            },
            {
                id: 6,
                story: ``,
                title: "Layer 6: ধাঁধা",
                description: "কোন জিনিস গাছে সবুজ, দোকানে কাল, বাড়িতে আনলে লাল?",
                answer: "চা",
                hint: "পান করার জিনিস",
                type: "ধাঁধা"
            },
            {
                id: 7,
                story: ``,
                title: "Layer 7: ধাঁধা",
                description: "আমার মধ্যে আছো তুমি, তোমার মধ্যে নাই; আমাদের মধ্যে আছো তুমি, বাবার মধ্যে নাই",
                answer: "আ",
                hint: "বাংলা  অক্ষর",
                type: "ধাঁধা"
            },
            {
                id: 8,
                story: `একটা দীপে 5 হাজার লোক বাস করে যার মধ্যে 3 হাজার লোকের এক পা নেই খরা 1 হাজার এর হাত নেই |`,
                title: "Layer 8: ধাঁধা",
                description: "ওই দীপে মোট কত জোরা  জুতা প্রয়োজন হবে?",
                answer: "5000",
                hint: "উত্তর হবে ইংরেজি নাম্বার এ যেমন 1000 . চিন্তা কর খরা মানুষ কয়টা জুতা কেনে ",
                type: "অঙ্ক"
            },
            {
                id: 9,
                story: `[ধাদা 9] যার আছে তিনটি হাত কিন্তু নেই পা বা শরীর? তবে সে চলতে থাকে সবসময় `,
                title: "Layer 9: ধাঁধা",
                description: "যার আছে তিনটি হাত কিন্তু নেই পা বা শরীর? তবে চলতে পারে ",
                answer: "ঘড়ি",
                hint: "সময় দেখায়",
                type: "ধাঁধা"
            },
            {
                id: 10,
                story: `[ধাদা 10] ব্রেন খাটাও `,
                title: "Layer 10: ধাঁধা",
                description: "জ্যোতিষ এর গার্লফ্রেন্ড কে ?",
                answer: "",
                hint: "আদৌ কি জ্যোতিষ এর গার্লফ্রেন্ড আছে ",
                type: "ধাঁধা"
            }
        ];

        // Game State
        let currentPuzzle = 0;
        let solvedPuzzles = 0;
        let startTime = Date.now();
        let hints_used = 0;

        // Configuration
        const GOOGLE_DRIVE_LINK = "https://drive.google.com/drive/folders/1Z__NFZRCdj-qsixVVdVwwqX2CybwuY_e?usp=drive_link";
        const DRIVE_PASSWORD = "komuna";

        function renderGame() {
            const gameContent = document.getElementById('gameContent');
            const puzzle = puzzles[currentPuzzle];
            const progress = ((currentPuzzle) / puzzles.length) * 100;

            // Update progress bar
            document.querySelector('.progress-fill').style.width = progress + '%';
            document.querySelector('.progress-fill').textContent = `${Math.round(progress)}% - LAYER ${currentPuzzle + 1}/${puzzles.length}`;

            gameContent.innerHTML = `
                <div class="story-section">
                    <p>${puzzle.story}</p>
                </div>

                <div class="puzzle-container">
                    <div class="puzzle-title">🔐 ${puzzle.title}</div>
                    <div class="puzzle-description">${puzzle.description}</div>
                    <input 
                        type="text" 
                        class="puzzle-input" 
                        id="answerInput" 
                        placeholder="Enter your answer..."
                        onkeypress="handleKeyPress(event)"
                    />
                    <div class="buttons">
                        <button class="btn btn-submit" onclick="checkAnswer()">SUBMIT ANSWER</button>
                        <button class="btn" onclick="toggleHint()">SHOW HINT</button>
                    </div>
                    <div class="hint" id="hintBox" style="display: none;">
                        💡 <strong>HINT:</strong> ${puzzle.hint}
                    </div>
                </div>

                <div class="message" id="message"></div>
            `;

            // Focus on input
            setTimeout(() => document.getElementById('answerInput').focus(), 100);
        }

        function handleKeyPress(event) {
            if (event.key === 'Enter') {
                checkAnswer();
            }
        }

        function checkAnswer() {
            const puzzle = puzzles[currentPuzzle];
            const input = document.getElementById('answerInput');
            const answer = input.value.trim().toLowerCase();
            const message = document.getElementById('message');

            if (answer === puzzle.answer.toLowerCase()) {
                solvedPuzzles++;
                showMessage('✓ ACCESS GRANTED - MOVING TO NEXT LAYER', 'success');
                
                setTimeout(() => {
                    if (currentPuzzle < puzzles.length - 1) {
                        currentPuzzle++;
                        renderGame();
                    } else {
                        showFinalScreen();
                    }
                }, 1500);
            } else {
                showMessage('✗ ACCESS DENIED - INCORRECT ANSWER', 'error');
                input.value = '';
            }
        }

        function toggleHint() {
            const hintBox = document.getElementById('hintBox');
            if (hintBox.style.display === 'none') {
                hintBox.style.display = 'block';
                hints_used++;
            } else {
                hintBox.style.display = 'none';
            }
        }

        function showMessage(text, type) {
            const message = document.getElementById('message');
            message.textContent = text;
            message.className = `message show ${type}`;
            setTimeout(() => {
                message.classList.remove('show');
            }, 3000);
        }

        function showFinalScreen() {
            const gameContent = document.getElementById('gameContent');
            const endTime = Date.now();
            const timeTaken = Math.floor((endTime - startTime) / 1000);
            const minutes = Math.floor(timeTaken / 60);
            const seconds = timeTaken % 60;

            gameContent.innerHTML = `
                <div class="final-screen show">
                    <h2>🎯 ALL LAYERS BREACHED 🎯</h2>
                    <p>NEXUS DATABASE UNLOCKED</p>

                    <button class="view-link-btn" onclick="openDriveLink()">ছবি দেখার জন্যে ক্লিক কর</button>

                    <div class="password-box">
                        <h3>🔐 DATABASE PASSWORD 🔐</h3>
                        <p id="passwordDisplay" style="display: none;">${DRIVE_PASSWORD}</p>
                        <button class="btn btn-submit" onclick="revealPassword()" style="width: 100%;">REVEAL PASSWORD</button>
                    </div>

                    <div class="stats">
                        <div class="stat-card">
                            <h3>PUZZLES SOLVED</h3>
                            <p>${solvedPuzzles}/10</p>
                        </div>
                        <div class="stat-card">
                            <h3>TIME TAKEN</h3>
                            <p>${minutes}m ${seconds}s</p>
                        </div>
                        <div class="stat-card">
                            <h3>HINTS USED</h3>
                            <p>${hints_used}</p>
                        </div>
                    </div>
                </div>
            `;
        }

        function copyToClipboard() {
            const linkInput = document.getElementById('linkInput');
            linkInput.select();
            document.execCommand('copy');
            alert('✓ LINK COPIED TO CLIPBOARD');
        }

        function openDriveLink() {
            window.location.href = GOOGLE_DRIVE_LINK;
        }

        function revealPassword() {
            const passwordDisplay = document.getElementById('passwordDisplay');
            const btn = event.target;
            if (passwordDisplay.style.display === 'none') {
                passwordDisplay.style.display = 'block';
                btn.textContent = 'PASSWORD REVEALED ✓';
                btn.style.background = '#00ff88';
                btn.style.color = '#0a0e27';
            }
        }

        // Initialize Game
        renderGame();
    </script>
</body>
</html>
